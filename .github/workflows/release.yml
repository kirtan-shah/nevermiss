name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.0.1-test)'
        required: true
        default: '0.0.1-test'
      dry_run:
        description: 'Skip GitHub Release and appcast commit'
        type: boolean
        default: true

env:
  SCHEME: NeverMiss
  APP_NAME: NeverMiss

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          # Force dry run on non-main branches
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            DRY_RUN="${{ inputs.dry_run || 'false' }}"
          else
            DRY_RUN="true"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DRY_RUN=$DRY_RUN" >> $GITHUB_ENV
          echo "Building version $VERSION (dry_run=$DRY_RUN)"

      - name: Install tools
        run: brew install create-dmg

      - name: Import signing certificate
        env:
          SIGNING_CERTIFICATE_P12: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          echo "$SIGNING_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "actions" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$SIGNING_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "actions" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Verify certificate imported
        run: |
          echo "=== Keychain search list ==="
          security list-keychains -d user

          echo "=== Identities in build keychain ==="
          security find-identity -v -p codesigning "$RUNNER_TEMP/build.keychain-db"

          echo "=== All signing identities ==="
          security find-identity -v -p codesigning

      - name: Set version in project
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $VERSION;/g" \
            $APP_NAME.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" \
            $APP_NAME.xcodeproj/project.pbxproj

      - name: Build universal binary
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcodebuild -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            ARCHS="arm64 x86_64" \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain-db" \
            archive

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

          APP_PATH="$RUNNER_TEMP/export/$APP_NAME.app"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create DMG
        run: |
          DMG_PATH="$RUNNER_TEMP/$APP_NAME-$VERSION.dmg"
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"

          create-dmg \
            --volname "$APP_NAME Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 175 120 \
            --app-drop-link 425 120 \
            "$DMG_PATH" \
            "$STAGING/"

          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Verify
        run: |
          echo "=== Checking code signature ==="
          codesign --verify --deep --strict "$APP_PATH"

          echo "=== Checking notarization ==="
          spctl -a -vvv "$APP_PATH" 2>&1 | tee /tmp/spctl.out
          grep -q "accepted" /tmp/spctl.out || { echo "FAIL: App not accepted by Gatekeeper"; exit 1; }

          echo "=== Checking universal binary ==="
          ARCHS=$(lipo -info "$APP_PATH/Contents/MacOS/$APP_NAME")
          echo "$ARCHS"
          echo "$ARCHS" | grep -q "arm64" || { echo "FAIL: Missing arm64"; exit 1; }
          echo "$ARCHS" | grep -q "x86_64" || { echo "FAIL: Missing x86_64"; exit 1; }

          echo "=== All checks passed ==="

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: NeverMiss-${{ env.VERSION }}.dmg
          path: ${{ env.DMG_PATH }}

      - name: Create GitHub Release
        if: env.DRY_RUN == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$DMG_PATH" \
            --title "$APP_NAME $VERSION" \
            --generate-notes

      - name: Generate appcast
        if: env.DRY_RUN == 'false'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          RELEASES_DIR="$RUNNER_TEMP/releases"
          mkdir -p "$RELEASES_DIR"
          cp "$DMG_PATH" "$RELEASES_DIR/"

          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData -name generate_appcast -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find $RUNNER_TEMP -name generate_appcast -type f 2>/dev/null | head -1)
          fi

          if [ -n "$SPARKLE_BIN" ]; then
            echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_private_key"
            "$SPARKLE_BIN" --ed-key-file "$RUNNER_TEMP/sparkle_private_key" \
              --download-url-prefix "https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/" \
              "$RELEASES_DIR"
            cp "$RELEASES_DIR/appcast.xml" "$GITHUB_WORKSPACE/appcast.xml"
          else
            echo "WARNING: generate_appcast not found, skipping appcast generation"
          fi

      - name: Commit appcast
        if: env.DRY_RUN == 'false'
        run: |
          if [ -f appcast.xml ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git fetch origin main
            git checkout main
            git add appcast.xml
            git diff --cached --quiet || git commit -m "Update appcast.xml for $GITHUB_REF_NAME"
            git push origin main
          fi
